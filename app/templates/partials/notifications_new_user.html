<div class="glass rounded-2xl p-6 md:p-10">
  <div class="max-w-lg mx-auto text-center">
    <div class="h-16 w-16 rounded-2xl bg-primary/15 text-primary grid place-items-center mx-auto mb-4">
      <i data-lucide="bell" class="h-8 w-8"></i>
    </div>
    <h2 class="font-display text-xl font-bold">No notifications yet</h2>
    <p class="text-sm text-muted-foreground mt-2">
      Updates about streaks, achievements, and new lessons will show up here once you start practicing.
    </p>
    <a href="{% url 'speaking' %}" class="btn btn-hero btn-sm mt-5">
      Try your first lesson <i data-lucide="arrow-right" class="h-4 w-4"></i>
    </a>
  </div>
</div>

<div class="bg-card rounded-2xl border border-border p-6">
  <h3 class="font-semibold text-sm mb-3">What you'll see here</h3>
  <div class="space-y-3">
    {% for hint in hints %}
    <div class="flex items-start gap-3 p-3 rounded-xl bg-secondary/25">
      <div class="h-9 w-9 rounded-lg bg-secondary grid place-items-center shrink-0 {{ hint.c }}">
        <i data-lucide="{{ hint.icon }}" class="h-4 w-4"></i>
      </div>
      <div>
        <p class="text-sm font-medium">{{ hint.t }}</p>
        <p class="text-xs text-muted-foreground mt-0.5">{{ hint.d }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
