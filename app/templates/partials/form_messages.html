{% if messages %}
<div class="space-y-2 mb-4">
  {% for message in messages %}
  <div class="rounded-xl border text-sm px-4 py-3 {% if message.tags == 'warning' %}border-warning/30 bg-warning/10 text-warning{% elif message.tags == 'error' %}border-destructive/30 bg-destructive/10 text-destructive{% elif message.tags == 'success' %}border-success/30 bg-success/10 text-success{% else %}border-primary/30 bg-primary/10 text-primary{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% if form_warning %}
<div class="rounded-xl border border-warning/30 bg-warning/10 text-warning text-sm px-4 py-3 mb-4">{{ form_warning }}</div>
{% endif %}
{% if form_error %}
<div class="rounded-xl border border-destructive/30 bg-destructive/10 text-destructive text-sm px-4 py-3 mb-4">{{ form_error }}</div>
{% endif %}
