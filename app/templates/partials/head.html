{% load static %}
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          sans: ["Inter", "system-ui", "sans-serif"],
          display: ["Inter", "system-ui", "sans-serif"],
        },
        borderRadius: {
          lg: "var(--radius)",
          xl: "calc(var(--radius) + 4px)",
          "2xl": "calc(var(--radius) + 8px)",
          "3xl": "calc(var(--radius) + 12px)",
          md: "calc(var(--radius) - 2px)",
          sm: "calc(var(--radius) - 4px)",
        },
        colors: {
          background: "rgb(var(--background) / <alpha-value>)",
          foreground: "rgb(var(--foreground) / <alpha-value>)",
          card: "rgb(var(--card) / <alpha-value>)",
          "card-foreground": "rgb(var(--card-foreground) / <alpha-value>)",
          popover: "rgb(var(--popover) / <alpha-value>)",
          "popover-foreground": "rgb(var(--popover-foreground) / <alpha-value>)",
          primary: {
            DEFAULT: "rgb(var(--primary) / <alpha-value>)",
            foreground: "rgb(var(--primary-foreground) / <alpha-value>)",
            glow: "rgb(var(--primary-glow) / <alpha-value>)",
          },
          secondary: {
            DEFAULT: "rgb(var(--secondary) / <alpha-value>)",
            foreground: "rgb(var(--secondary-foreground) / <alpha-value>)",
          },
          muted: {
            DEFAULT: "rgb(var(--muted) / <alpha-value>)",
            foreground: "rgb(var(--muted-foreground) / <alpha-value>)",
          },
          accent: {
            DEFAULT: "rgb(var(--accent) / <alpha-value>)",
            foreground: "rgb(var(--accent-foreground) / <alpha-value>)",
          },
          destructive: {
            DEFAULT: "rgb(var(--destructive) / <alpha-value>)",
            foreground: "rgb(var(--destructive-foreground) / <alpha-value>)",
          },
          success: "rgb(var(--success) / <alpha-value>)",
          warning: "rgb(var(--warning) / <alpha-value>)",
          border: "rgb(var(--border) / <alpha-value>)",
          input: "rgb(var(--input) / <alpha-value>)",
          ring: "rgb(var(--ring) / <alpha-value>)",
        },
        keyframes: {
          "fade-in": { from: { opacity: 0, transform: "translateY(8px)" }, to: { opacity: 1, transform: "translateY(0)" } },
          "slide-up": { from: { opacity: 0, transform: "translateY(20px)" }, to: { opacity: 1, transform: "translateY(0)" } },
          "scale-in": { from: { opacity: 0, transform: "scale(0.96)" }, to: { opacity: 1, transform: "scale(1)" } },
          "glow-pulse": {
            "0%,100%": { boxShadow: "0 0 30px -8px oklch(0.65 0.25 295 / 0.5)" },
            "50%": { boxShadow: "0 0 60px -4px oklch(0.7 0.28 295 / 0.8)" },
          },
          float: { "0%,100%": { transform: "translateY(0)" }, "50%": { transform: "translateY(-12px)" } },
        },
        animation: {
          "fade-in": "fade-in 0.5s ease-out",
          "slide-up": "slide-up 0.4s ease-out",
          "scale-in": "scale-in 0.3s ease-out",
          "glow-pulse": "glow-pulse 3s ease-in-out infinite",
          float: "float 6s ease-in-out infinite",
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="{% static 'app/theme.css' %}" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
  // Theme persistence (light / dark) — matches the original toggle behaviour.
  (function () {
    var saved = localStorage.getItem("lisa-theme");
    if (saved === "light") document.documentElement.classList.remove("dark");
    else document.documentElement.classList.add("dark");
  })();
  function toggleTheme() {
    var el = document.documentElement;
    el.classList.toggle("dark");
    localStorage.setItem("lisa-theme", el.classList.contains("dark") ? "dark" : "light");
  }
  function setTheme(mode) {
    var el = document.documentElement;
    if (mode === "dark") el.classList.add("dark");
    else el.classList.remove("dark");
    localStorage.setItem("lisa-theme", mode);
  }
  window.addEventListener("DOMContentLoaded", function () {
    if (window.lucide) lucide.createIcons();
  });
</script>
