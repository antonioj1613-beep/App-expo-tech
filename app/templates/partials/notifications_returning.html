<div class="flex items-center justify-between mb-4">
  <p class="text-sm text-muted-foreground">Recent activity</p>
  {% if unread_count %}
  <button class="btn btn-ghost btn-sm" type="button"><i data-lucide="check" class="h-3.5 w-3.5"></i> Mark all read</button>
  {% endif %}
</div>
<div class="glass rounded-2xl">
  <div class="p-2">
    {% if items %}
    {% for n in items %}
    <div class="flex items-start gap-4 p-4 rounded-xl transition hover:bg-secondary/40 {% if n.new %}bg-primary/[0.04]{% endif %}">
      <div class="h-10 w-10 rounded-xl grid place-items-center shrink-0 {{ n.c }}"><i data-lucide="{{ n.icon }}" class="h-5 w-5"></i></div>
      <div class="flex-1 min-w-0"><p class="text-sm font-medium leading-snug">{{ n.t }}</p><p class="text-xs text-muted-foreground mt-1">{{ n.d }}</p></div>
      {% if n.new %}<span class="bg-primary/15 text-primary text-[10px] px-2 py-0.5 rounded-full">New</span>{% endif %}
    </div>
    {% endfor %}
    {% else %}
    <div class="p-8 text-center">
      <p class="text-sm text-muted-foreground">No recent activity. Complete a lesson to see updates here.</p>
      <a href="{% url 'levels' %}" class="btn btn-hero btn-sm mt-4">Browse lessons</a>
    </div>
    {% endif %}
  </div>
</div>
