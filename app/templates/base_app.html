<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    {% include "partials/head.html" %}
    <title>{% block title %}Lisa{% endblock %}</title>
  </head>
  <body>
    {% load static %}
    <div class="min-h-screen flex w-full bg-background relative">
      <div class="pointer-events-none fixed inset-0 bg-gradient-mesh opacity-60"></div>
      <div class="pointer-events-none fixed inset-0 grid-bg opacity-30"></div>
      {% include "partials/sidebar.html" %}
      <div class="flex-1 flex flex-col min-w-0 relative">
        {% block main %}{% endblock %}
      </div>
    </div>
    <script>if (window.lucide) lucide.createIcons();</script>
    <script src="{% static 'app/stats-ui.js' %}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
